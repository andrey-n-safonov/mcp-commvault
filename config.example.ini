[commvault]
# CommServer base URL (port 81 for REST API v2)
url = http://commserver.example.com:81

# CommCell username (role: Master or View)
username = apiuser

# Env var that holds the password (plain text, NOT base64 — the server encodes it)
password_env = COMMVAULT_PASSWORD

# Optional: SOCKS5 or HTTP proxy to reach the CommServer
# proxy = socks5h://127.0.0.1:1080
